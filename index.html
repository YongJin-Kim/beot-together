<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>벗과함께</title>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f2f5;
      color: #1e1e2e;
      min-height: 100dvh;
    }
    .app { max-width: 480px; margin: 0 auto; padding: 0 0 48px; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      padding: 28px 20px 24px;
      text-align: center;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 20px rgba(79,70,229,0.3);
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: 0.82rem; opacity: 0.85; margin-top: 6px; }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin: 16px 16px 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .card-title {
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: #6b7280; margin-bottom: 14px;
    }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active   { transform: scale(0.97); opacity: 0.9; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-contacts { background: linear-gradient(135deg, #7c3aed, #a855f7); color:#fff; box-shadow: 0 4px 14px rgba(124,58,237,0.35); }
    .btn-compare  { background: linear-gradient(135deg, #059669, #10b981); color:#fff; box-shadow: 0 4px 14px rgba(5,150,105,0.35); }
    .btn-chrome   { background: linear-gradient(135deg, #ea580c, #f97316); color:#fff; box-shadow: 0 4px 14px rgba(234,88,12,0.35); }
    .btn-excel    { background: linear-gradient(135deg, #1d6f42, #217346); color:#fff; box-shadow: 0 4px 14px rgba(29,111,66,0.35); }
    .btn-email    { background: linear-gradient(135deg, #dc2626, #ef4444); color:#fff; box-shadow: 0 4px 14px rgba(220,38,38,0.35); }
    .btn-clear    { background: #f3f4f6; color: #374151; font-size: 0.85rem; padding: 11px; margin-top: 10px; }
    .btn-cancel   { background: #f3f4f6; color: #374151; }
    .btn-copy     { background: linear-gradient(135deg, #0ea5e9, #38bdf8); color:#fff; box-shadow: 0 4px 14px rgba(14,165,233,0.35); }

    /* ── PIN ── */
    .pin-wrap  { text-align: center; }
    .pin-label { font-size: 0.85rem; color: #6b7280; margin-bottom: 20px; }
    .pin-dots  { display: flex; justify-content: center; gap: 16px; margin-bottom: 28px; }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #d1d5db; background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.filled { background: #4f46e5; border-color: #4f46e5; }
    .pin-dot.error  { background: #ef4444; border-color: #ef4444; }
    .pin-pad {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; max-width: 280px; margin: 0 auto;
    }
    .pin-key {
      background: #f9fafb; border: 1.5px solid #e5e7eb;
      border-radius: 12px; padding: 16px;
      font-size: 1.2rem; font-weight: 700; color: #1e1e2e;
      cursor: pointer; transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .pin-key:active { background: #e0e7ff; transform: scale(0.95); }
    .pin-key.del   { font-size: 1rem; color: #6b7280; }
    .pin-key.empty { visibility: hidden; pointer-events: none; }

    /* ── 연락처 로드됨 미리보기 ── */
    .contact-loaded {
      display: flex; align-items: center; gap: 12px;
      background: #f5f3ff; border: 1.5px solid #c4b5fd;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    }
    .cl-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cl-info strong { font-size: 0.92rem; color: #4c1d95; display: block; }
    .cl-info span   { font-size: 0.78rem; color: #7c3aed; }
    .cl-reset {
      margin-left: auto; background: none; border: none;
      color: #a78bfa; font-size: 1rem; cursor: pointer; padding: 4px; flex-shrink: 0;
    }

    /* ── 미지원 안내 박스 ── */
    .notice-box {
      border-radius: 14px; padding: 20px 18px;
      text-align: center; margin-bottom: 10px;
    }
    .notice-box .notice-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .notice-box .notice-title {
      font-size: 0.95rem; font-weight: 700;
      color: #1e1e2e; margin-bottom: 6px;
    }
    .notice-box .notice-desc {
      font-size: 0.8rem; color: #6b7280;
      line-height: 1.6; margin-bottom: 16px;
    }
    .notice-kakao  { background: #fff7ed; border: 1.5px solid #fed7aa; }
    .notice-desktop{ background: #f0fdf4; border: 1.5px solid #bbf7d0; }

    /* URL 복사 박스 */
    .url-copy-box {
      display: flex; gap: 8px;
      background: #f9fafb; border: 1.5px solid #e5e7eb;
      border-radius: 10px; padding: 10px 12px;
      margin-bottom: 12px; align-items: center;
    }
    .url-copy-box span {
      font-size: 0.75rem; color: #374151;
      word-break: break-all; flex: 1;
    }
    .url-copy-btn {
      background: #4f46e5; color: #fff;
      border: none; border-radius: 7px;
      padding: 6px 10px; font-size: 0.72rem;
      font-weight: 600; cursor: pointer; flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Results ── */
    #results-section { display: none; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .result-count  { background: #4f46e5; color: #fff; font-size: 0.78rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; }
    .result-list   { display: flex; flex-direction: column; gap: 8px; }
    .result-item   {
      display: flex; align-items: center; gap: 12px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 10px; padding: 12px 14px;
    }
    .result-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, #059669, #10b981);
      color: #fff; font-size: 0.85rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .result-name  { font-weight: 700; font-size: 0.95rem; color: #065f46; }
    .result-phone { font-size: 0.8rem; color: #047857; margin-top: 2px; }
    .match-tag {
      margin-left: auto; background: #dcfce7; color: #15803d;
      font-size: 0.72rem; font-weight: 600;
      padding: 3px 8px; border-radius: 999px; flex-shrink: 0;
    }
    .empty-state { text-align: center; padding: 30px 0; color: #9ca3af; font-size: 0.9rem; }
    .empty-state svg { margin: 0 auto 12px; display: block; opacity: 0.4; }

    /* ── Actions ── */
    .actions-row { display: flex; gap: 10px; }
    .actions-row .btn { flex: 1; font-size: 0.88rem; padding: 14px 10px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e1e2e; color: #fff;
      padding: 12px 20px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 500; white-space: nowrap;
      z-index: 9999; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .toast.show    { transform: translateX(-50%) translateY(0); }
    .toast.success { background: #065f46; }
    .toast.error   { background: #991b1b; }
    .toast.info    { background: #1e40af; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px; width: 100%; max-width: 480px; margin: 0 auto;
    }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 6px; }
    .modal p  { font-size: 0.82rem; color: #6b7280; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: 0.8rem; font-weight: 600; color: #374151; display: block; margin-bottom: 5px; }
    .form-group input {
      width: 100%; border: 1.5px solid #e5e7eb; border-radius: 10px;
      padding: 11px 14px; font-size: 0.9rem; outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: #4f46e5; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns .btn { flex: 1; font-size: 0.9rem; padding: 14px; }
    .info-note {
      background: #eff6ff; border-left: 3px solid #3b82f6;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.78rem; color: #1e40af; line-height: 1.5; margin-top: 10px;
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">

  <header>
    <h1>🤝 벗과함께</h1>
    <p>우리 함께</p>
  </header>

  <!-- PIN 카드 -->
  <div class="card" id="pin-card">
    <div class="pin-wrap">
      <div class="pin-label">코드를 입력하세요</div>
      <div class="pin-dots">
        <span class="pin-dot" id="pd0"></span>
        <span class="pin-dot" id="pd1"></span>
        <span class="pin-dot" id="pd2"></span>
        <span class="pin-dot" id="pd3"></span>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinInput('1')">1</button>
        <button class="pin-key" onclick="pinInput('2')">2</button>
        <button class="pin-key" onclick="pinInput('3')">3</button>
        <button class="pin-key" onclick="pinInput('4')">4</button>
        <button class="pin-key" onclick="pinInput('5')">5</button>
        <button class="pin-key" onclick="pinInput('6')">6</button>
        <button class="pin-key" onclick="pinInput('7')">7</button>
        <button class="pin-key" onclick="pinInput('8')">8</button>
        <button class="pin-key" onclick="pinInput('9')">9</button>
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinInput('0')">0</button>
        <button class="pin-key del" onclick="pinDelete()">⌫</button>
      </div>
    </div>
  </div>

  <!-- 기능 카드 (PIN 인증 후) -->
  <div class="card" id="func-card" style="display:none">
    <!-- 환경 감지 결과 표시 (진단용) -->
    <div id="env-badge" style="font-size:0.72rem;color:#9ca3af;text-align:center;margin-bottom:12px;padding:6px 10px;background:#f9fafb;border-radius:8px"></div>
    <!-- 브라우저 환경에 따라 JS가 동적으로 채움 -->
    <div id="contacts-area"></div>

    <button class="btn btn-compare" id="btn-compare" onclick="compareContacts()" disabled style="margin-top:14px">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
      연락처 비교하기
    </button>
  </div>

  <!-- 결과 -->
  <div class="card" id="results-section">
    <div class="result-header">
      <div class="card-title" style="margin:0">비교 결과</div>
      <span class="result-count" id="result-count">0명 일치</span>
    </div>
    <div class="result-list" id="result-list"></div>
    <div class="actions-row" style="margin-top:16px">
      <button class="btn btn-excel" onclick="exportExcel()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Excel 저장
      </button>
      <button class="btn btn-email" onclick="openEmailModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        메일 발송
      </button>
    </div>
    <button class="btn btn-clear" onclick="clearResults()">결과 초기화</button>
  </div>

</div>

<!-- EmailJS Modal -->
<div class="modal-overlay" id="email-modal">
  <div class="modal">
    <h3>📧 이메일 발송 설정</h3>
    <p>EmailJS 계정 정보를 입력하세요. 한 번 저장하면 자동으로 사용됩니다.</p>
    <div class="form-group">
      <label>EmailJS Public Key</label>
      <input type="text" id="ejs-public-key" placeholder="예: user_xxxxxxxxxxx" />
    </div>
    <div class="form-group">
      <label>Service ID</label>
      <input type="text" id="ejs-service-id" placeholder="예: service_xxxxxxx" />
    </div>
    <div class="form-group">
      <label>Template ID</label>
      <input type="text" id="ejs-template-id" placeholder="예: template_xxxxxxx" />
    </div>
    <div class="form-group">
      <label>수신 이메일</label>
      <input type="email" id="ejs-to-email" value="yongjinin@gmail.com" />
    </div>
    <div class="info-note">
      💡 <b>EmailJS 설정 방법:</b><br>
      1. emailjs.com 에서 무료 계정 생성<br>
      2. Email Service 연결 (Gmail 등)<br>
      3. Email Template 생성 후 위 정보 입력
    </div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeEmailModal()">취소</button>
      <button class="btn btn-email" id="btn-send-email" onclick="sendEmail()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
        발송하기
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────
//  기존 비교 대상 데이터
// ────────────────────────────────────────────
const SAMPLE_DATA = [
  { name: '김용진', phone: '010-7446-1120' },
  { name: '송진우', phone: '010-8951-2208' },
  { name: '이광필', phone: '010-4875-8042' },
];

let phoneContacts  = [];
let matchedContacts = [];

// ────────────────────────────────────────────
//  브라우저 환경 감지
// ────────────────────────────────────────────
const UA        = navigator.userAgent;
const IS_KAKAO  = /KAKAOTALK/i.test(UA);
const IS_ANDROID= /Android/i.test(UA);
const IS_IOS    = /iPhone|iPad|iPod/i.test(UA);
const IS_MOBILE = IS_ANDROID || IS_IOS;
// ContactsManager 전역 노출 여부는 브라우저마다 다름 → 'contacts' in navigator 만으로 판정
const HAS_CONTACTS_API = ('contacts' in navigator);

// ────────────────────────────────────────────
//  PIN
// ────────────────────────────────────────────
const CORRECT_PIN = '1234';
let pinBuffer = '';

function pinInput(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 120);
}
function pinDelete() { pinBuffer = pinBuffer.slice(0, -1); updatePinDots(); }
function updatePinDots(state) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    dot.className = 'pin-dot';
    if (state === 'error') dot.classList.add('error');
    else if (i < pinBuffer.length) dot.classList.add('filled');
  }
}
function checkPin() {
  if (pinBuffer === CORRECT_PIN) {
    document.getElementById('pin-card').style.display = 'none';
    document.getElementById('func-card').style.display = 'block';
    initEmailConfig();
    renderContactsArea();   // ← 브라우저 환경에 맞는 UI 렌더
  } else {
    updatePinDots('error');
    setTimeout(() => { pinBuffer = ''; updatePinDots(); }, 600);
    showToast('코드가 올바르지 않습니다', 'error');
  }
}

// ────────────────────────────────────────────
//  연락처 영역 렌더 (환경별 분기)
// ────────────────────────────────────────────
function renderContactsArea() {
  // 환경 진단 배지
  const envParts = [];
  if (IS_KAKAO)   envParts.push('KakaoTalk');
  if (IS_ANDROID) envParts.push('Android');
  if (IS_IOS)     envParts.push('iOS');
  if (!IS_MOBILE) envParts.push('Desktop');
  envParts.push(HAS_CONTACTS_API ? '✅ Contacts API 지원' : '❌ Contacts API 미지원');
  document.getElementById('env-badge').textContent = '감지: ' + envParts.join(' · ');

  const area = document.getElementById('contacts-area');

  if (HAS_CONTACTS_API) {
    // ✅ 지원 환경 (Android Chrome / iOS Safari HTTPS)
    area.innerHTML = `
      <button class="btn btn-contacts" id="btn-load" onclick="loadContactsAuto()">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857
               M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857
               m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        연락처 가져오기
      </button>`;

  } else if (IS_KAKAO && IS_ANDROID) {
    // 🟠 카카오톡 (Android) → Chrome으로 열기
    area.innerHTML = `
      <div class="notice-box notice-kakao">
        <div class="notice-icon">🦊</div>
        <div class="notice-title">카카오톡에서는 연락처 접근이 제한됩니다</div>
        <div class="notice-desc">아래 버튼을 눌러 Chrome에서 열면<br>연락처를 바로 가져올 수 있습니다.</div>
        <button class="btn btn-chrome" onclick="openInChrome()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4
                 M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Chrome으로 열기
        </button>
      </div>`;

  } else if (IS_KAKAO && IS_IOS) {
    // 🟠 카카오톡 (iOS) → URL 복사 후 Safari 안내
    const url = location.href;
    area.innerHTML = `
      <div class="notice-box notice-kakao">
        <div class="notice-icon">🦊</div>
        <div class="notice-title">카카오톡에서는 연락처 접근이 제한됩니다</div>
        <div class="notice-desc">아래 URL을 복사하여 Safari에서 열어주세요.</div>
        <div class="url-copy-box">
          <span>${url}</span>
          <button class="url-copy-btn" onclick="copyURL()">복사</button>
        </div>
        <div style="font-size:0.76rem;color:#9ca3af;margin-top:4px">
          Safari 주소창에 붙여넣기 후 접속하세요
        </div>
      </div>`;

  } else if (!IS_MOBILE) {
    // 💻 데스크탑 → 모바일 안내
    const url = location.href;
    area.innerHTML = `
      <div class="notice-box notice-desktop">
        <div class="notice-icon">📱</div>
        <div class="notice-title">모바일 기기에서 접속해 주세요</div>
        <div class="notice-desc">연락처 자동 가져오기는 스마트폰의<br>Chrome / Safari 에서만 사용 가능합니다.</div>
        <div class="url-copy-box">
          <span>${url}</span>
          <button class="url-copy-btn" onclick="copyURL()">복사</button>
        </div>
      </div>`;

  } else {
    // 🔵 기타 모바일 브라우저 (삼성 인터넷, Firefox 등)
    area.innerHTML = `
      <div class="notice-box" style="background:#f0f9ff;border:1.5px solid #bae6fd">
        <div class="notice-icon">🌐</div>
        <div class="notice-title">Chrome 또는 Safari를 권장합니다</div>
        <div class="notice-desc">현재 브라우저에서 연락처 접근이 지원되지 않을 수 있습니다.<br>Chrome 또는 Safari에서 아래 URL로 접속해 주세요.</div>
        <div class="url-copy-box">
          <span>${location.href}</span>
          <button class="url-copy-btn" onclick="copyURL()">복사</button>
        </div>
      </div>`;
  }
}

// ────────────────────────────────────────────
//  연락처 자동 가져오기 (Web Contacts API)
// ────────────────────────────────────────────
async function loadContactsAuto() {
  const btn = document.getElementById('btn-load');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> 불러오는 중…`;

  try {
    const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });

    if (!contacts.length) {
      showToast('선택된 연락처가 없습니다', 'info');
      btn.disabled = false;
      btn.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857
               M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857
               m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        연락처 가져오기`;
      return;
    }

    phoneContacts = contacts.flatMap(c => {
      const name = (c.name || [''])[0] || '이름없음';
      return (c.tel || []).map(tel => ({ name, phone: tel }));
    });

    // 버튼 → 완료 미리보기로 교체
    document.getElementById('contacts-area').innerHTML = `
      <div class="contact-loaded">
        <div class="cl-icon">📋</div>
        <div class="cl-info">
          <strong>${phoneContacts.length}개 연락처 로드됨</strong>
          <span>스마트폰 연락처 (자동 가져오기)</span>
        </div>
        <button class="cl-reset" onclick="resetContacts()" title="다시 선택">✕</button>
      </div>`;

    document.getElementById('btn-compare').disabled = false;
    showToast(`✅ ${phoneContacts.length}개 연락처 로드 완료`, 'success');

  } catch (err) {
    console.error(err);
    showToast('연락처 접근이 취소되었습니다', 'error');
    btn.disabled = false;
    btn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
           viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857
             M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857
             m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      연락처 가져오기`;
  }
}

function resetContacts() {
  phoneContacts = [];
  document.getElementById('btn-compare').disabled = true;
  clearResults();
  renderContactsArea();
}

// ────────────────────────────────────────────
//  외부 브라우저 열기
// ────────────────────────────────────────────
function openInChrome() {
  const url = location.href;
  // 1순위: KakaoTalk 자체 외부브라우저 오픈 scheme
  try {
    location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
  } catch(e) {}
  // 2순위: Android intent (브라우저 앱 선택 팝업 → Chrome 선택)
  setTimeout(() => {
    location.href = 'intent://' + url.replace(/^https?:\/\//, '')
      + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
  }, 500);
}

function copyURL() {
  const url = location.href;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url)
      .then(() => showToast('URL 복사됨! Safari에 붙여넣기 하세요', 'success'))
      .catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
}
function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('URL 복사됨!', 'success');
}

// ────────────────────────────────────────────
//  전화번호 정규화
// ────────────────────────────────────────────
function normalizePhone(p) {
  if (!p) return '';
  let n = p.replace(/[\s\-().+]/g, '');
  if (n.startsWith('82')) n = '0' + n.slice(2);
  return n;
}

// ────────────────────────────────────────────
//  비교
// ────────────────────────────────────────────
function compareContacts() {
  if (!phoneContacts.length) { showToast('먼저 연락처를 가져오세요', 'error'); return; }

  const btn = document.getElementById('btn-compare');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> 비교 중…`;

  const phoneSet = new Map();
  phoneContacts.forEach(c => phoneSet.set(normalizePhone(c.phone), c.name));

  matchedContacts = SAMPLE_DATA
    .filter(s => phoneSet.has(normalizePhone(s.phone)))
    .map(s => ({ name: s.name, phone: s.phone }));

  renderResults(matchedContacts);

  btn.disabled = false;
  btn.innerHTML = `
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
           M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
    </svg>
    연락처 비교하기`;
}

function renderResults(list) {
  const section = document.getElementById('results-section');
  const countEl = document.getElementById('result-count');
  const listEl  = document.getElementById('result-list');

  section.style.display = 'block';
  countEl.textContent = `${list.length}명 일치`;

  if (!list.length) {
    listEl.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        일치하는 연락처가 없습니다
      </div>`;
    showToast('일치하는 연락처가 없습니다', 'info');
    return;
  }

  listEl.innerHTML = list.map(p => `
    <div class="result-item">
      <div class="result-avatar">${p.name.slice(0,1)}</div>
      <div>
        <div class="result-name">${p.name}</div>
        <div class="result-phone">${p.phone}</div>
      </div>
      <span class="match-tag">일치 ✓</span>
    </div>`).join('');

  showToast(`✅ ${list.length}명 일치 발견!`, 'success');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function clearResults() {
  document.getElementById('results-section').style.display = 'none';
  document.getElementById('result-list').innerHTML = '';
  matchedContacts = [];
}

// ────────────────────────────────────────────
//  Excel 내보내기
// ────────────────────────────────────────────
function exportExcel() {
  if (!matchedContacts.length) { showToast('내보낼 결과가 없습니다', 'error'); return; }
  try {
    const date = new Date().toLocaleDateString('ko-KR').replace(/\.\s*/g, '-').replace(/-$/, '');
    const rows = [
      ['이름', '연락처', '비교일'],
      ...matchedContacts.map(p => [p.name, p.phone, date]),
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 12 }, { wch: 18 }, { wch: 14 }];
    XLSX.utils.book_append_sheet(wb, ws, '일치 연락처');

    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob  = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url   = URL.createObjectURL(blob);
    const a     = document.createElement('a');
    a.href = url; a.download = `벗과함께_${date}.xlsx`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Excel 파일 저장 완료', 'success');
  } catch (e) {
    console.error(e);
    showToast('저장 실패 - 외부 브라우저에서 시도해 주세요', 'error');
  }
}

// ────────────────────────────────────────────
//  Email
// ────────────────────────────────────────────
function loadEmailConfig()  { try { return JSON.parse(localStorage.getItem('emailjs_cfg') || '{}'); } catch { return {}; } }
function saveEmailConfig(c) { localStorage.setItem('emailjs_cfg', JSON.stringify(c)); }
function initEmailConfig() {
  const c = loadEmailConfig();
  if (c.publicKey)  document.getElementById('ejs-public-key').value  = c.publicKey;
  if (c.serviceId)  document.getElementById('ejs-service-id').value  = c.serviceId;
  if (c.templateId) document.getElementById('ejs-template-id').value = c.templateId;
  if (c.toEmail)    document.getElementById('ejs-to-email').value    = c.toEmail;
}
function openEmailModal()  {
  if (!matchedContacts.length) { showToast('전송할 결과가 없습니다', 'error'); return; }
  document.getElementById('email-modal').classList.add('open');
}
function closeEmailModal() { document.getElementById('email-modal').classList.remove('open'); }

async function sendEmail() {
  const publicKey  = document.getElementById('ejs-public-key').value.trim();
  const serviceId  = document.getElementById('ejs-service-id').value.trim();
  const templateId = document.getElementById('ejs-template-id').value.trim();
  const toEmail    = document.getElementById('ejs-to-email').value.trim();
  if (!publicKey || !serviceId || !templateId || !toEmail) { showToast('모든 항목을 입력해주세요', 'error'); return; }
  saveEmailConfig({ publicKey, serviceId, templateId, toEmail });

  const btn = document.getElementById('btn-send-email');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> 전송 중…`;

  const date  = new Date().toLocaleString('ko-KR');
  const table = matchedContacts.map((p, i) => `${i+1}. ${p.name}  ${p.phone}`).join('\n');
  try {
    emailjs.init({ publicKey });
    await emailjs.send(serviceId, templateId, {
      to_email: toEmail, to_name: '관리자',
      subject: `[벗과함께] ${matchedContacts.length}명 일치 - ${date}`,
      message: `비교 일시: ${date}\n일치 인원: ${matchedContacts.length}명\n\n--- 일치 목록 ---\n${table}`,
      match_count: matchedContacts.length, date,
    });
    showToast('메일 발송 완료!', 'success');
    closeEmailModal();
  } catch (err) {
    console.error(err);
    showToast(`발송 실패: ${err.text || err.message || '설정을 확인하세요'}`, 'error');
  }
  btn.disabled = false;
  btn.innerHTML = `
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
         viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
    </svg>
    발송하기`;
}

// ────────────────────────────────────────────
//  Toast
// ────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  el.textContent = msg;
  el.className = `toast ${type}`;
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
  toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

document.getElementById('email-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEmailModal();
});
</script>
